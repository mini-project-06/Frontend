server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # AI 표지(Base64) 등 큰 요청 body 허용 (nginx 기본 1m → 413 방지)
    client_max_body_size 25m;

    # API calls proxied to the backend service (k8s service name: bookserver)
    location /api/ {
        proxy_pass http://bookserver:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }
}
