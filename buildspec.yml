version: 0.2

env:
  parameter-store:
    VITE_API_URL: "/book-app/prod/VITE_API_URL"

phases:
  install:
    runtime-versions:
      nodejs: 20
  pre_build:
    commands:
      - npm ci
      - chmod +x scripts/sync-codebuild-env.sh
      - ./scripts/sync-codebuild-env.sh
  build:
    commands:
      - npm run build
      - echo "Build completed!!!"
    finally:
      - echo "This is the finally block execution!"

artifacts:
  base-directory: dist
  files:
    - "**/*"
