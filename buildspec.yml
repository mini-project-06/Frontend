version: 0.2

# AWS CodeBuild에서 빌드 속도를 높이기 위해 node_modules를 캐싱합니다.
cache:
  paths:
    - 'node_modules/**/*'

phases:
  install:
    runtime-versions:
      # 프로젝트의 Node.js 버전에 맞게 설정합니다.
      nodejs: 20

  pre_build:
    commands:
      - echo "Pre-build phase - installing dependencies..."
      # package-lock.json을 기준으로 의존성 패키지를 안정적이고 빠르게 설치합니다.
      - npm ci

  build:
    commands:
      - echo "Build phase - compiling project..."
      # Vite 프로젝트를 빌드하여 정적 파일들을 생성합니다.
      - npm run build

  post_build:
    commands:
      - echo "Build completed on `date`"

artifacts:
  # 빌드 결과물인 dist 폴더의 모든 파일을 빌드 아티팩트로 지정합니다.
  files:
    - '**/*'
  base-directory: dist
