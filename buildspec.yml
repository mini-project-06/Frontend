version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
  pre_build:
    commands:
      - npm ci
  build:
    commands:
      - npm run build
      - echo "Build completed!!!"
    finally:
      - echo "This is the finally block execution!"

artifacts:
  base-directory: dist
  files:
    - "**/*"
